# =============================================
# CONFIGURACIÓN GLOBAL / COMÚN (Para todos los perfiles)
# =============================================
spring:
  profiles:
    active: dev
  config:
    import: optional:dotenv.properties

# ─── SERVIDOR GENERAL ────────────────────────
server:
  servlet:
    context-path: /

---
# =============================================
# PERFIL: DESARROLLO (dev)
# =============================================
spring:
  config:
    activate:
      on-profile: dev

  # ─── BASE DE DATOS POSTGRESQL ──────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/facturacion_db?stringtype=unspecified}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:cesr1311}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ─── JPA / HIBERNATE ───────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # ─── DEVTOOLS ──────────────────────────────
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  # ─── CORS INTERNO SPRING ───────────────────
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173

  # ─── MAIL CONFIGURATION (SMTP GMAIL) ───────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:sangroniscarlosenrique2@gmail.com}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            trust: smtp.gmail.com
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ─── TWILIO CONFIGURATION (dev) ──────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}

# ─── APP CUSTOM PROPERTIES (dev) ─────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_cambiar_en_produccion_minimo_256_bits}
  base-url: ${APP_BASE_URL:https://stilt-cornstalk-lively.ngrok-free.dev}
  webhook:
    secret: ${WEBHOOK_SECRET:my-secret-key}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  storage:
    pdf-directory: ${PDF_STORAGE_DIR:./invoices/pdf}
    xml-directory: ${XML_STORAGE_DIR:./invoices/xml}
    json-directory: ${JSON_STORAGE_DIR:./invoices/json}

# ─── LOGGING (dev) ───────────────────────────
logging:
  level:
    root: INFO
    com.modelosgr86e1eq6.proyectofacturacion: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ─── SERVIDOR (dev) ──────────────────────────
server:
  port: 8082
  error:
    include-stacktrace: always

---
# =============================================
# PERFIL: PRODUCCIÓN (prod)
# =============================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    cache: true

  devtools:
    restart:
      enabled: false

# ─── TWILIO CONFIGURATION (prod) ─────────────
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

# ─── APP CUSTOM PROPERTIES (prod) ────────────
app:
  jwt:
    secret: ${JWT_SECRET}
  base-url: ${APP_BASE_URL}
  webhook:
    secret: ${WEBHOOK_SECRET}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  storage:
    pdf-directory: ${PDF_STORAGE_DIR:/var/invoices-pdf}

# ─── LOGGING (prod) ──────────────────────────
logging:
  level:
    root: WARN
    com.modelosgr86e1eq6.proyectofacturacion: INFO

# ─── SERVIDOR (prod) ─────────────────────────
server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never